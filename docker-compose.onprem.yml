## Tiresias On-Prem Edge Proxy
## Stateless local proxy; all management + data in SaaS control plane.
## Twin-A routes through this. Twin-I routes through proxy.tiresias.network.

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: salucallc/tiresias-proxy:onprem
    ports:
      - "${PROXY_PORT:-8080}:${PROXY_PORT:-8080}"
    environment:
      # Core
      PROXY_PORT: "${PROXY_PORT:-8080}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      TIRESIAS_MODE: "onprem"

      # License
      TIRESIAS_LICENSE_TOKEN: "${TIRESIAS_LICENSE_TOKEN}"

      # Providers (local Ollama + Anthropic)
      TIRESIAS_PROVIDERS: "${TIRESIAS_PROVIDERS:-anthropic,ollama}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"

      # Encryption (at-rest for local buffer, in-transit to control plane)
      TIRESIAS_KEK_PROVIDER: "local"
      TIRESIAS_KEK: "${TIRESIAS_KEK}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"

      # Control plane (SaaS)
      TIRESIAS_CONTROL_PLANE_URL: "${TIRESIAS_CONTROL_PLANE_URL:-https://platform.tiresias.network}"
      TIRESIAS_INTERNAL_API_KEY: "${TIRESIAS_INTERNAL_API_KEY}"
      SOUL_API_URL: "${SOUL_API_URL:-http://100.126.52.122:8080}"
      SOUL_API_KEY: "${SOUL_API_KEY}"

      # Tenant
      TIRESIAS_TENANT_ID: "${TIRESIAS_TENANT_ID}"

      # Retention
      TIRESIAS_RETENTION_DAYS: "365"
      TIRESIAS_USAGE_RETENTION_DAYS: "365"

      # Storage (ephemeral local buffer)
      TIRESIAS_DATA_ROOT: "/app/data"
      DATABASE_URL: "sqlite+aiosqlite:////app/data/tiresias.db"
    volumes:
      - proxy_buffer:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PROXY_PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  proxy_buffer:
