version: "3.9"

services:
  # ── Main AI observability proxy ────────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: tiresias:latest
    ports:
      - "${PROXY_PORT:-8080}:${PROXY_PORT:-8080}"
    environment:
      - PROXY_PORT=${PROXY_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TIRESIAS_LICENSE_TOKEN=${TIRESIAS_LICENSE_TOKEN:-}
      - TIRESIAS_RENEWAL_URL=${TIRESIAS_RENEWAL_URL:-https://license.saluca.com/v1/renew}
      - TIRESIAS_RELAY_URL=${TIRESIAS_RELAY_URL:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - tiresias_data:/app/data
    depends_on:
      - relay
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PROXY_PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Dashboard UI ───────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: tiresias:latest
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    environment:
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=${DATABASE_URL:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - TIRESIAS_LICENSE_TOKEN=${TIRESIAS_LICENSE_TOKEN:-}
    volumes:
      - tiresias_data:/app/data
    command: ["sh", "-c", "uvicorn tiresias.dashboard.app:app --host 0.0.0.0 --port ${DASHBOARD_PORT:-3000} --log-level ${LOG_LEVEL:-info}"]
    restart: unless-stopped

  # ── License relay proxy ────────────────────────────────────────────────────
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    ports:
      - "${RELAY_PORT:-8090}:${RELAY_PORT:-8090}"
    environment:
      - RELAY_PORT=${RELAY_PORT:-8090}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${RELAY_PORT:-8090}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tiresias_data:
